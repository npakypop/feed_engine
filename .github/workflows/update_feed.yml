name: Update Maudau Feed

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch: 

permissions:
  contents: write # Обов'язково для виправлення помилки 128

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Оновлено з v3 на v4 (вирішує Node.js warning)
        with:
          fetch-depth: 0 # Завантажує всю історію, щоб Git не "губився" при пуші

      - name: Set up Python
        uses: actions/setup-python@v5 # Оновлено з v4 на v5 (вирішує Node.js warning)
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        env:
          MASTER_FEED_URL: ${{ secrets.MASTER_FEED_URL }} # Передаємо секретне посилання в код
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add maudau_feed.xml
          # Додаємо перевірку, щоб не падати, якщо файл не змінився
          git commit -m "Auto-update feed: $(date)" || echo "No changes to commit"
          git push origin main # Чітко вказуємо куди пушити
